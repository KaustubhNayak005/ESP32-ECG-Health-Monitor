<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" width="100%" height="100%" style="background-color: #f8f9fa;">

<defs>
    <style>
        .mod { fill: #ffffff; stroke: #343a40; stroke-width: 2px; }
        .mod-title { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #212529; text-anchor: middle; }
        .pin { fill: #ffd43b; stroke: #b08d00; stroke-width: 1px; }
        .pin-lbl-l { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #495057; text-anchor: start; }
        .pin-lbl-r { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #495057; text-anchor: end; }
        .bus { stroke-width: 4px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .wire { stroke-width: 2px; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .junct { fill: #000000; }
        .bus-lbl { font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
    </style>
</defs>

<g id="buses">
<path class="bus" stroke="#e03131" stroke-dasharray="5,5" d="M 350 150 V 850" />
