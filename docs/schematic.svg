<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
    <defs>
        <style>
            .module { fill: #f8f9fa; stroke: #343a40; stroke-width: 3px; rx: 5px; }
            .module-title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #343a40; text-anchor: middle; }
            .pin { font-family: Arial, sans-serif; font-size: 12px; fill: #495057; }
            .pin-point { fill: #495057; }
            .wire-pwr { stroke: #e03131; stroke-width: 2px; fill: none; stroke-linejoin: round; }
            .wire-gnd { stroke: #212529; stroke-width: 2px; fill: none; stroke-linejoin: round; }
            .wire-sig { stroke: #1971c2; stroke-width: 2px; fill: none; stroke-linejoin: round; }
            .wire-i2c { stroke: #0ca678; stroke-width: 2px; fill: none; stroke-linejoin: round; stroke-dasharray: 4; }
            .wire-spi { stroke: #f08c00; stroke-width: 2px; fill: none; stroke-linejoin: round; stroke-dasharray: 4; }
            .label { font-family: Arial, sans-serif; font-size: 11px; fill: #868e96; }
        </style>
    </defs>

    <!-- Background -->
    <rect width="1000" height="800" fill="#ffffff" />
    <text x="500" y="40" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#212529">Hardware Schematic: ECG Monitoring System</text>

    <!-- ESP32 -->
    <g transform="translate(400, 150)">
        <rect class="module" width="200" height="450" />
        <text class="module-title" x="100" y="30">ESP32-WROOM-32</text>
        
        <!-- Left Pins -->
        <circle class="pin-point" cx="0" cy="80" r="3"/><text class="pin" x="10" y="84">3.3V</text>
        <circle class="pin-point" cx="0" cy="110" r="3"/><text class="pin" x="10" y="114">GND</text>
        <circle class="pin-point" cx="0" cy="140" r="3"/><text class="pin" x="10" y="144">GPIO 34 (ADC)</text>
        <circle class="pin-point" cx="0" cy="170" r="3"/><text class="pin" x="10" y="174">GPIO 14 (LO+)</text>
        <circle class="pin-point" cx="0" cy="200" r="3"/><text class="pin" x="10" y="204">GPIO 12 (LO-)</text>
        <circle class="pin-point" cx="0" cy="230" r="3"/><text class="pin" x="10" y="234">GPIO 25 (BUZ)</text>
        
        <!-- Right Pins -->
        <circle class="pin-point" cx="200" cy="80" r="3"/><text class="pin" x="190" y="84" text-anchor="end">5V (VIN)</text>
        <circle class="pin-point" cx="200" cy="110" r="3"/><text class="pin" x="190" y="114" text-anchor="end">GND</text>
        <circle class="pin-point" cx="200" cy="140" r="3"/><text class="pin" x="190" y="144" text-anchor="end">GPIO 21 (SDA)</text>
        <circle class="pin-point" cx="200" cy="170" r="3"/><text class="pin" x="190" y="174" text-anchor="end">GPIO 22 (SCL)</text>
        <circle class="pin-point" cx="200" cy="200" r="3"/><text class="pin" x="190" y="204" text-anchor="end">GPIO 5 (CS)</text>
        <circle class="pin-point" cx="200" cy="230" r="3"/><text class="pin" x="190" y="234" text-anchor="end">GPIO 23 (MOSI)</text>
        <circle class="pin-point" cx="200" cy="260" r="3"/><text class="pin" x="190" y="264" text-anchor="end">GPIO 19 (MISO)</text>
        <circle class="pin-point" cx="200" cy="290" r="3"/><text class="pin" x="190" y="294" text-anchor="end">GPIO 18 (SCK)</text>
    </g>

    <!-- AD8232 -->
    <g transform="translate(100, 150)">
        <rect class="module" width="120" height="150" />
        <text class="module-title" x="60" y="30">AD8232</text>
        <circle class="pin-point" cx="120" cy="60" r="3"/><text class="pin" x="110" y="64" text-anchor="end">3.3V</text>
        <circle class="pin-point" cx="120" cy="80" r="3"/><text class="pin" x="110" y="84" text-anchor="end">GND</text>
        <circle class="pin-point" cx="120" cy="100" r="3"/><text class="pin" x="110" y="104" text-anchor="end">OUTPUT</text>
        <circle class="pin-point" cx="120" cy="120" r="3"/><text class="pin" x="110" y="124" text-anchor="end">LO+</text>
        <circle class="pin-point" cx="120" cy="140" r="3"/><text class="pin" x="110" y="144" text-anchor="end">LO-</text>
    </g>

    <!-- Buzzer -->
    <g transform="translate(100, 350)">
        <rect class="module" width="120" height="100" />
        <text class="module-title" x="60" y="30">Active Buzzer</text>
        <circle class="pin-point" cx="120" cy="50" r="3"/><text class="pin" x="110" y="54" text-anchor="end">VCC (5V)</text>
        <circle class="pin-point" cx="120" cy="70" r="3"/><text class="pin" x="110" y="74" text-anchor="end">GND</text>
        <circle class="pin-point" cx="120" cy="90" r="3"/><text class="pin" x="110" y="94" text-anchor="end">I/O</text>
    </g>

    <!-- MAX30102 -->
    <g transform="translate(750, 100)">
        <rect class="module" width="120" height="120" />
        <text class="module-title" x="60" y="30">MAX30102</text>
        <circle class="pin-point" cx="0" cy="50" r="3"/><text class="pin" x="10" y="54">VIN (3.3V)</text>
        <circle class="pin-point" cx="0" cy="70" r="3"/><text class="pin" x="10" y="74">GND</text>
        <circle class="pin-point" cx="0" cy="90" r="3"/><text class="pin" x="10" y="94">SDA</text>
        <circle class="pin-point" cx="0" cy="110" r="3"/><text class="pin" x="10" y="114">SCL</text>
    </g>

    <!-- OLED -->
    <g transform="translate(750, 260)">
        <rect class="module" width="120" height="120" />
        <text class="module-title" x="60" y="30">OLED Display</text>
        <circle class="pin-point" cx="0" cy="50" r="3"/><text class="pin" x="10" y="54">VCC (3.3V)</text>
        <circle class="pin-point" cx="0" cy="70" r="3"/><text class="pin" x="10" y="74">GND</text>
        <circle class="pin-point" cx="0" cy="90" r="3"/><text class="pin" x="10" y="94">SDA</text>
        <circle class="pin-point" cx="0" cy="110" r="3"/><text class="pin" x="10" y="114">SCL</text>
    </g>

    <!-- SD Card -->
    <g transform="translate(750, 420)">
        <rect class="module" width="120" height="160" />
        <text class="module-title" x="60" y="30">microSD Module</text>
        <circle class="pin-point" cx="0" cy="50" r="3"/><text class="pin" x="10" y="54">VCC (5V)</text>
        <circle class="pin-point" cx="0" cy="70" r="3"/><text class="pin" x="10" y="74">GND</text>
        <circle class="pin-point" cx="0" cy="90" r="3"/><text class="pin" x="10" y="94">CS</text>
        <circle class="pin-point" cx="0" cy="110" r="3"/><text class="pin" x="10" y="114">MOSI</text>
        <circle class="pin-point" cx="0" cy="130" r="3"/><text class="pin" x="10" y="134">MISO</text>
        <circle class="pin-point" cx="0" cy="150" r="3"/><text class="pin" x="10" y="154">SCK</text>
    </g>

    <!-- Routing Lines -->
    <!-- AD8232 -->
    <path class="wire-pwr" d="M 220,210 L 300,210 L 300,230 L 400,230" /> <!-- 3.3V -->
    <path class="wire-gnd" d="M 220,230 L 290,230 L 290,260 L 400,260" /> <!-- GND -->
    <path class="wire-sig" d="M 220,250 L 280,250 L 280,290 L 400,290" /> <!-- OUTPUT -->
    <path class="wire-sig" d="M 220,270 L 270,270 L 270,320 L 400,320" /> <!-- LO+ -->
    <path class="wire-sig" d="M 220,290 L 260,290 L 260,350 L 400,350" /> <!-- LO- -->
    
    <!-- Buzzer -->
    <path class="wire-pwr" d="M 220,400 L 280,400 L 280,190 L 600,190 L 600,230" /> <!-- 5V (from ESP VIN pin path routing) -->
    <path class="wire-gnd" d="M 220,420 L 290,420 L 290,260" /> <!-- GND -->
    <path class="wire-sig" d="M 220,440 L 320,440 L 320,380 L 400,380" /> <!-- I/O -->

    <!-- MAX30102 -->
    <path class="wire-pwr" d="M 600,230 L 650,230 L 650,150 L 750,150" /> <!-- 3.3V -->
    <path class="wire-gnd" d="M 600,260 L 660,260 L 660,170 L 750,170" /> <!-- GND -->
    <path class="wire-i2c" d="M 600,290 L 670,290 L 670,190 L 750,190" /> <!-- SDA -->
    <path class="wire-i2c" d="M 600,320 L 680,320 L 680,210 L 750,210" /> <!-- SCL -->
    
    <!-- OLED -->
    <path class="wire-pwr" d="M 650,230 L 650,310 L 750,310" /> <!-- 3.3V -->
    <path class="wire-gnd" d="M 660,260 L 660,330 L 750,330" /> <!-- GND -->
    <path class="wire-i2c" d="M 670,290 L 670,350 L 750,350" /> <!-- SDA -->
    <path class="wire-i2c" d="M 680,320 L 680,370 L 750,370" /> <!-- SCL -->
    
    <!-- SD Card -->
    <path class="wire-pwr" d="M 600,230 L 750,470" /> <!-- 5V -->
    <path class="wire-gnd" d="M 600,260 L 750,490" /> <!-- GND -->
    <path class="wire-spi" d="M 600,350 L 690,350 L 690,510 L 750,510" /> <!-- CS -->
    <path class="wire-spi" d="M 600,380 L 700,380 L 700,530 L 750,530" /> <!-- MOSI -->
    <path class="wire-spi" d="M 600,410 L 710,410 L 710,550 L 750,550" /> <!-- MISO -->
    <path class="wire-spi" d="M 600,440 L 720,440 L 720,570 L 750,570" /> <!-- SCK -->
    
    <!-- Power Labels -->
    <text class="label" x="250" y="205">3.3V</text>
    <text class="label" x="250" y="225">GND</text>
    <text class="label" x="625" y="225">5V / 3.3V</text>
    
    <!-- Connection Dots -->
    <circle cx="290" cy="260" r="3" fill="#212529" /> <!-- GND Junction -->
    <circle cx="650" cy="230" r="3" fill="#e03131" /> <!-- 3.3V Junction -->
    <circle cx="660" cy="260" r="3" fill="#212529" /> <!-- GND Junction -->
    <circle cx="670" cy="290" r="3" fill="#0ca678" /> <!-- SDA Junction -->
    <circle cx="680" cy="320" r="3" fill="#0ca678" /> <!-- SCL Junction -->

</svg>
