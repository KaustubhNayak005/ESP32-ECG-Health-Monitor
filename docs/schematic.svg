<?xml version="1.0" encoding="UTF-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" width="100%" height="100%">
    <defs>
        <!-- Grid Pattern -->
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e9ecef" stroke-width="1"/>
        </pattern>
        <pattern id="grid-major" width="100" height="100" patternUnits="userSpaceOnUse">
            <rect width="100" height="100" fill="url(#grid)" />
            <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#dee2e6" stroke-width="2"/>
        </pattern>
        
        <!-- Drop Shadow -->
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
        </filter>

        <!-- Component Styles -->
        <style>
            .pcb { fill: #2b8a3e; stroke: #1971c2; stroke-width: 2px; filter: url(#shadow); }
            .pcb-black { fill: #212529; stroke: #343a40; stroke-width: 2px; filter: url(#shadow); }
            .pcb-blue { fill: #1864ab; stroke: #0b2b5e; stroke-width: 2px; filter: url(#shadow); }
            .pcb-purple { fill: #5f3dc4; stroke: #3b286d; stroke-width: 2px; filter: url(#shadow); }
            .shield { fill: #ced4da; stroke: #868e96; stroke-width: 2px; }
            .chip { fill: #212529; stroke: #000; stroke-width: 1px; }
            .title-text { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
            
            .pin-rect { fill: #ffd43b; stroke: #b08d00; stroke-width: 1px; }
            .pin-text-left { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ffffff; text-anchor: start; }
            .pin-text-right { font-family: 'Courier New', monospace; font-size: 12px; font-weight: bold; fill: #ffffff; text-anchor: end; }
            
            /* Wiring Styles */
            .wire-pwr33 { stroke: #e03131; stroke-width: 3px; fill: none; stroke-linejoin: bevel; }
            .wire-pwr5  { stroke: #c92a2a; stroke-width: 3px; fill: none; stroke-linejoin: bevel; stroke-dasharray: 8 4; }
            .wire-gnd   { stroke: #000000; stroke-width: 3px; fill: none; stroke-linejoin: bevel; }
            .wire-sig   { stroke: #1c7ed6; stroke-width: 3px; fill: none; stroke-linejoin: bevel; }
            .wire-i2c   { stroke: #2f9e44; stroke-width: 3px; fill: none; stroke-linejoin: bevel; }
            .wire-spi   { stroke: #e67700; stroke-width: 3px; fill: none; stroke-linejoin: bevel; }
            
            .wire-label { font-family: 'Courier New', monospace; font-size: 12px; fill: #495057; font-weight: bold; background: white;}
            .junction { fill: #000000; }
        </style>
    </defs>

    <!-- Background Grid -->
    <rect width="1200" height="1000" fill="url(#grid-major)" />

    <!-- ======================= WIRING ROUTING (Drawn first so it's behind components) ======================= -->
    
    <!-- 3.3V Power Bus (Red) -->
    <!-- ESP32 to AD8232 -->
    <path class="wire-pwr33" d="M 270 250 H 500" />
    <!-- ESP32 to MAX30102 -->
    <path class="wire-pwr33" d="M 900 250 H 750 V 220 H 480 V 250 H 500" />
    <!-- OLED to MAX VIN line -->
    <path class="wire-pwr33" d="M 900 420 H 830 V 250 H 750" />
    <circle class="junction" cx="750" cy="250" r="4" fill="#e03131" />

    <!-- 5V Power Bus (Dashed Red) -->
    <!-- SD Card to ESP32 -->
    <path class="wire-pwr5" d="M 900 620 H 820 V 250 H 700" />
    <!-- Buzzer to ESP32 -->
    <path class="wire-pwr5" d="M 270 520 H 340 V 150 H 750 V 250 H 700" />
    <circle class="junction" cx="750" cy="250" r="4" fill="#c92a2a" /> <!-- Jump over point -->

    <!-- Ground Bus (Black) -->
    <!-- ESP32 to AD8232 -->
    <path class="wire-gnd" d="M 270 280 H 500" />
    <!-- ESP32 to Buzzer -->
    <path class="wire-gnd" d="M 270 550 H 480 V 280 H 500" />
    <circle class="junction" cx="480" cy="280" r="4" />
    <!-- ESP32 to MAX30102 -->
    <path class="wire-gnd" d="M 900 280 H 700" />
    <!-- ESP32 to OLED -->
    <path class="wire-gnd" d="M 900 450 H 810 V 280 H 700" />
    <circle class="junction" cx="810" cy="280" r="4" />
    <!-- ESP32 to SD -->
    <path class="wire-gnd" d="M 900 650 H 790 V 280 H 700" />
    <circle class="junction" cx="790" cy="280" r="4" />

    <!-- Analog / GPIO (Blue) -->
    <!-- AD8232 OUTPUT to GPIO34 -->
    <path class="wire-sig" d="M 270 310 H 460 V 340 H 500" />
    <!-- AD8232 LO+ to GPIO14 -->
    <path class="wire-sig" d="M 270 340 H 440 V 370 H 500" />
    <!-- AD8232 LO- to GPIO12 -->
    <path class="wire-sig" d="M 270 370 H 420 V 400 H 500" />
    <!-- Buzzer I/O to GPIO25 -->
    <path class="wire-sig" d="M 270 580 H 460 V 430 H 500" />

    <!-- I2C Bus (Green) -->
    <!-- MAX30102 SDA -->
    <path class="wire-i2c" d="M 900 310 H 770 V 340 H 700" />
    <!-- OLED SDA -->
    <path class="wire-i2c" d="M 900 480 H 770 V 340" />
    <circle class="junction" cx="770" cy="340" r="4" fill="#2f9e44" />
    <!-- MAX30102 SCL -->
    <path class="wire-i2c" d="M 900 340 H 750 V 370 H 700" />
    <!-- OLED SCL -->
    <path class="wire-i2c" d="M 900 510 H 750 V 370" />
    <circle class="junction" cx="750" cy="370" r="4" fill="#2f9e44" />

    <!-- SPI Bus (Orange) -->
    <!-- SD CS to GPIO 5 -->
    <path class="wire-spi" d="M 900 680 H 770 V 460 H 700" />
    <!-- SD MOSI to GPIO 23 -->
    <path class="wire-spi" d="M 900 710 H 750 V 490 H 700" />
    <!-- SD MISO to GPIO 19 -->
    <path class="wire-spi" d="M 900 740 H 730 V 520 H 700" />
    <!-- SD SCK to GPIO 18 -->
    <path class="wire-spi" d="M 900 770 H 710 V 550 H 700" />

    <!-- ======================= COMPONENTS ======================= -->

    <!-- ESP32-WROOM-32 (Center) -->
    <g transform="translate(480, 200)">
        <rect class="pcb-black" x="0" y="0" width="240" height="400" rx="10" />
        <!-- Antenna Trace -->
        <rect class="pin-rect" x="60" y="10" width="120" height="40" fill="#ced4da" />
        <path d="M 70 40 V 20 H 90 V 40 H 110 V 20 H 130 V 40 H 150 V 20 H 170 V 40" stroke="#868e96" stroke-width="4" fill="none" />
        <!-- Shield -->
        <rect class="shield" x="50" y="60" width="140" height="150" rx="4" />
        <text x="120" y="120" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#343a40" text-anchor="middle">ESP32-WROOM-32</text>
        <text x="120" y="140" font-family="'Courier New', monospace" font-size="12" fill="#868e96" text-anchor="middle">Wi-Fi &amp; Bluetooth</text>

        <!-- ESP32 Pins Left -->
        <g transform="translate(0, 50)">
            <rect class="pin-rect" x="-5" y="-5" width="15" height="10" /><text class="pin-text-left" x="15" y="4">3.3V</text>
            <rect class="pin-rect" x="-5" y="25" width="15" height="10" /><text class="pin-text-left" x="15" y="34">GND</text>
            <rect class="pin-rect" x="-5" y="85" width="15" height="10" /><text class="pin-text-left" x="15" y="94">GPIO 34 (ADC)</text>
            <rect class="pin-rect" x="-5" y="115" width="15" height="10" /><text class="pin-text-left" x="15" y="124">GPIO 14 (LO+)</text>
            <rect class="pin-rect" x="-5" y="145" width="15" height="10" /><text class="pin-text-left" x="15" y="154">GPIO 12 (LO-)</text>
            <rect class="pin-rect" x="-5" y="175" width="15" height="10" /><text class="pin-text-left" x="15" y="184">GPIO 25 (BUZ)</text>
        </g>

        <!-- ESP32 Pins Right -->
        <g transform="translate(240, 50)">
            <rect class="pin-rect" x="-10" y="-5" width="15" height="10" /><text class="pin-text-right" x="-15" y="4">5V (VIN)</text>
            <rect class="pin-rect" x="-10" y="25" width="15" height="10" /><text class="pin-text-right" x="-15" y="34">GND</text>
            <rect class="pin-rect" x="-10" y="85" width="15" height="10" /><text class="pin-text-right" x="-15" y="94">GPIO 21 (SDA)</text>
            <rect class="pin-rect" x="-10" y="115" width="15" height="10" /><text class="pin-text-right" x="-15" y="124">GPIO 22 (SCL)</text>
            <rect class="pin-rect" x="-10" y="205" width="15" height="10" /><text class="pin-text-right" x="-15" y="214">GPIO 5 (CS)</text>
            <rect class="pin-rect" x="-10" y="235" width="15" height="10" /><text class="pin-text-right" x="-15" y="244">GPIO 23 (MOSI)</text>
            <rect class="pin-rect" x="-10" y="265" width="15" height="10" /><text class="pin-text-right" x="-15" y="274">GPIO 19 (MISO)</text>
            <rect class="pin-rect" x="-10" y="295" width="15" height="10" /><text class="pin-text-right" x="-15" y="304">GPIO 18 (SCK)</text>
        </g>
    </g>

    <!-- AD8232 ECG Sensor (Top Left) -->
    <g transform="translate(150, 180)">
        <rect class="pcb" x="0" y="0" width="120" height="220" rx="5" />
        <text class="title-text" x="60" y="30">AD8232</text>
        <!-- Sensor Graphic -->
        <circle cx="60" cy="110" r="25" fill="#f8f9fa" />
        <path d="M 40 110 L 50 110 L 55 90 L 65 130 L 70 110 L 80 110" stroke="#e03131" stroke-width="3" fill="none" />
        <rect class="chip" x="50" y="50" width="20" height="20" />
        
        <!-- Pins Right -->
        <g transform="translate(120, 70)">
            <rect class="pin-rect" x="-10" y="-5" width="15" height="10" /><text class="pin-text-right" x="-15" y="4">3.3V</text>
            <rect class="pin-rect" x="-10" y="25" width="15" height="10" /><text class="pin-text-right" x="-15" y="34">GND</text>
            <rect class="pin-rect" x="-10" y="55" width="15" height="10" /><text class="pin-text-right" x="-15" y="64">OUTPUT</text>
            <rect class="pin-rect" x="-10" y="85" width="15" height="10" /><text class="pin-text-right" x="-15" y="94">LO+</text>
            <rect class="pin-rect" x="-10" y="115" width="15" height="10" /><text class="pin-text-right" x="-15" y="124">LO-</text>
        </g>
    </g>

    <!-- Active Buzzer (Bottom Left) -->
    <g transform="translate(150, 480)">
        <rect class="pcb-blue" x="0" y="0" width="120" height="130" rx="5" />
        <text class="title-text" x="60" y="25">Buzzer</text>
        <!-- Buzzer Graphic -->
        <circle cx="60" cy="70" r="30" fill="#212529" stroke="#495057" stroke-width="4"/>
        <circle cx="60" cy="70" r="10" fill="#343a40" />
        
        <!-- Pins Right -->
        <g transform="translate(120, 40)">
            <rect class="pin-rect" x="-10" y="-5" width="15" height="10" /><text class="pin-text-right" x="-15" y="4">VCC (5V)</text>
            <rect class="pin-rect" x="-10" y="25" width="15" height="10" /><text class="pin-text-right" x="-15" y="34">GND</text>
            <rect class="pin-rect" x="-10" y="55" width="15" height="10" /><text class="pin-text-right" x="-15" y="64">I/O</text>
        </g>
    </g>

    <!-- MAX30102 (Top Right) -->
    <g transform="translate(900, 200)">
        <rect class="pcb-purple" x="0" y="0" width="120" height="170" rx="5" />
        <text class="title-text" x="60" y="25">MAX30102</text>
        <!-- Sensor Window -->
        <rect class="chip" x="40" y="80" width="40" height="30" rx="3" />
        <circle cx="50" cy="95" r="5" fill="#c92a2a" /> <!-- Red LED -->
        <circle cx="70" cy="95" r="5" fill="#495057" /> <!-- IR LED -->

        <!-- Pins Left -->
        <g transform="translate(0, 50)">
            <rect class="pin-rect" x="-5" y="-5" width="15" height="10" /><text class="pin-text-left" x="15" y="4">VIN</text>
            <rect class="pin-rect" x="-5" y="25" width="15" height="10" /><text class="pin-text-left" x="15" y="34">GND</text>
            <rect class="pin-rect" x="-5" y="55" width="15" height="10" /><text class="pin-text-left" x="15" y="64">SDA</text>
            <rect class="pin-rect" x="-5" y="85" width="15" height="10" /><text class="pin-text-left" x="15" y="94">SCL</text>
        </g>
    </g>

    <!-- OLED Display (Middle Right) -->
    <g transform="translate(900, 390)">
        <rect class="pcb-blue" x="0" y="0" width="140" height="150" rx="5" />
        <text class="title-text" x="70" y="20">OLED 1.3"</text>
        <!-- Screen -->
        <rect x="25" y="70" width="100" height="60" fill="#000000" stroke="#f1f3f5" stroke-width="2" />
        <text x="35" y="90" font-family="'Courier New', monospace" font-size="10" fill="#0ca678">HR: 85 BPM</text>
        <text x="35" y="105" font-family="'Courier New', monospace" font-size="10" fill="#0ca678">SpO2: 98%</text>

        <!-- Pins Left -->
        <g transform="translate(0, 30)">
            <rect class="pin-rect" x="-5" y="-5" width="15" height="10" /><text class="pin-text-left" x="15" y="4">VCC</text>
            <rect class="pin-rect" x="-5" y="25" width="15" height="10" /><text class="pin-text-left" x="15" y="34">GND</text>
            <rect class="pin-rect" x="-5" y="55" width="15" height="10" /><text class="pin-text-left" x="15" y="64">SDA</text>
            <rect class="pin-rect" x="-5" y="85" width="15" height="10" /><text class="pin-text-left" x="15" y="94">SCL</text>
        </g>
    </g>

    <!-- MicroSD Card (Bottom Right) -->
    <g transform="translate(900, 560)">
        <rect class="pcb-blue" x="0" y="0" width="120" height="230" rx="5" />
        <text class="title-text" x="60" y="25">MicroSD</text>
        <!-- SD Slot Graphic -->
        <rect x="30" y="160" width="80" height="50" fill="#ced4da" stroke="#868e96" stroke-width="2" />
        <rect x="35" y="150" width="70" height="15" fill="#343a40" />

        <!-- Pins Left -->
        <g transform="translate(0, 60)">
            <rect class="pin-rect" x="-5" y="-5" width="15" height="10" /><text class="pin-text-left" x="15" y="4">VCC (5V)</text>
            <rect class="pin-rect" x="-5" y="25" width="15" height="10" /><text class="pin-text-left" x="15" y="34">GND</text>
            <rect class="pin-rect" x="-5" y="55" width="15" height="10" /><text class="pin-text-left" x="15" y="64">CS</text>
            <rect class="pin-rect" x="-5" y="85" width="15" height="10" /><text class="pin-text-left" x="15" y="94">MOSI</text>
            <rect class="pin-rect" x="-5" y="115" width="15" height="10" /><text class="pin-text-left" x="15" y="124">MISO</text>
            <rect class="pin-rect" x="-5" y="145" width="15" height="10" /><text class="pin-text-left" x="15" y="154">SCK</text>
        </g>
    </g>

    <!-- Floating Wire Labels -->
    <rect x="350" y="240" width="40" height="18" fill="white" rx="3" /><text class="wire-label" x="370" y="253" text-anchor="middle">3.3V</text>
    <rect x="350" y="270" width="30" height="18" fill="white" rx="3" /><text class="wire-label" x="365" y="283" text-anchor="middle">GND</text>
    <rect x="500" y="130" width="30" height="18" fill="white" rx="3" /><text class="wire-label" x="515" y="143" text-anchor="middle">5V</text>
    <rect x="800" y="300" width="30" height="18" fill="white" rx="3" /><text class="wire-label" x="815" y="313" text-anchor="middle">SDA</text>
    <rect x="830" y="330" width="30" height="18" fill="white" rx="3" /><text class="wire-label" x="845" y="343" text-anchor="middle">SCL</text>
    
    <!-- Title Block (Drawn LAST to be on top) -->
    <rect x="780" y="850" width="400" height="130" fill="#ffffff" stroke="#343a40" stroke-width="3" filter="url(#shadow)" />
    <line x1="780" y1="890" x2="1180" y2="890" stroke="#343a40" stroke-width="2" />
    <line x1="780" y1="930" x2="1180" y2="930" stroke="#343a40" stroke-width="2" />
    <line x1="980" y1="890" x2="980" y2="980" stroke="#343a40" stroke-width="2" />
    <text x="980" y="875" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#343a40" text-anchor="middle">ECG Monitoring System Schematic</text>
    <text x="790" y="915" font-family="'Courier New', monospace" font-size="14" fill="#343a40">Drawn By: Kaustubh Nayak</text>
    <text x="790" y="955" font-family="'Courier New', monospace" font-size="14" fill="#343a40">Date: 2026-07-09</text>
    <text x="990" y="915" font-family="'Courier New', monospace" font-size="14" fill="#343a40">Rev: 2.0 (PlatformIO)</text>
    <text x="990" y="955" font-family="'Courier New', monospace" font-size="14" fill="#343a40">License: Apache 2.0</text>

</svg>
